<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantitative Fisheries Management</title>
    <style>
        /* 웹사이트의 디자인을 꾸미는 영역입니다. */
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 2.5rem;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.2em;
        }
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .paper-box {
            background-color: #ffffff;
            border: 1px solid #dddddd;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .paper-title {
            color: #2980b9;
            font-size: 1.4em;
            margin-top: 0;
            line-height: 1.4;
        }
        .folder-list {
            list-style-type: none; /* 기본 점 기호를 없앱니다. */
            padding: 0;
            margin-top: 1.5rem;
        }
        .folder-list li {
            background-color: #ecf0f1;
            margin: 0.8rem 0;
            padding: 1rem;
            border-radius: 5px;
            font-weight: bold;
        }
        /* 각 항목 이름 앞에 폴더 모양 기호를 추가합니다. */
        .folder-list li::before {
            content: "📁 "; 
        }
        .folder-list li a {
            text-decoration: none; /* 링크의 밑줄을 없앱니다. */
            color: #2c3e50;
        }
        .folder-list li a:hover {
            color: #3498db; /* 마우스를 올렸을 때 색상이 변합니다. */
        }
    </style>
</head>
<body>
    <!-- 웹사이트에 실제로 보이는 내용입니다. -->
    <header>
        <h1>Quantitative Fisheries Management</h1>
    </header>

    <div class="container">
        <!-- 논문과 자료를 담는 상자입니다. -->
        <div class="paper-box">
            <h2 class="paper-title">Incorporation of spatio-temporal variability in Korean chub mackerel (Scomber japonicus) population to the stock assessment</h2>
            <p>본 논문과 관련된 분석 데이터 및 소스 코드를 아래에서 확인할 수 있습니다.</p>
            
            <!-- 폴더 목록을 만듭니다. -->
            <ul class="folder-list">
                <li><a href="#">Data</a></li>
                <li><a href="#">GMM code</a></li>
                <li><a href="#">State-space age structure model</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
